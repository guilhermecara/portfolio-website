<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Guilherme Cardoso de Araujo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0; /* Matches typical PDF viewer background */
        }
        #pdf-frame {
            height: 100vh;
            width: 100vw;
            border: none;
        }
        #error-msg {
            display: none;
            font-family: system-ui, sans-serif;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>

    <iframe id="pdf-frame" title="CV Preview" allowfullscreen></iframe>
    
    <div id="error-msg">
        <p>No file specified. Please use the format: <code>view.html?file=/cv/filename.pdf</code></p>
    </div>

    <script type="text/javascript">
        const urlParams = new URLSearchParams(window.location.search);
        // Default to your specific CV if no file is provided in the URL
        const targetPdf = urlParams.get('file') || '/cv/guilherme-cardoso-de-araujo-cv-fr.pdf';
        const frame = document.getElementById('pdf-frame');
        const errorMsg = document.getElementById('error-msg');

        if (targetPdf) {
            // Ensure we resolve the path from the site root
            const absolutePdfUrl = new URL(targetPdf, window.location.origin + '/').href;

            // Point to your local viewer build
            const viewerUrl = '/vendor/web/viewer.html?file=' + encodeURIComponent(absolutePdfUrl);
            frame.src = viewerUrl;
        } else {
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
