<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CV</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        #pdf-frame {
            height: 100vh;
            width: 100vw;
            border: none;
        }
        #pdf-frame:not([src]) {
            display: none;
        }
        #error-msg {
            display: none;
            font-family: system-ui, sans-serif;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>

    <iframe id="pdf-frame" title="CV Preview" allowfullscreen></iframe>
    <div id="error-msg">
        <p>No file specified.</p>
    </div>

    <script type="text/javascript">
        const urlParams = new URLSearchParams(window.location.search);
        const targetPdf = urlParams.get('file');
        const frame = document.getElementById('pdf-frame');
        const errorMsg = document.getElementById('error-msg');

        if (targetPdf) {
            // Resolve against the site root FIRST. Without this, a relative
            // path like "cv/foo.pdf" gets resolved by the browser relative
            // to viewer.html's own location (/vendor/pdfjs/web/) instead of
            // the site root, and silently 404s.
            const absolutePdfUrl = new URL(targetPdf, window.location.origin + '/').href;

            // /vendor/web/viewer.html is the self-hosted, official
            // PDF.js viewer build. It natively supports ?file=<url>.
            const viewerUrl = '/vendor/web/viewer.html?file='
                + encodeURIComponent(absolutePdfUrl);
            frame.src = viewerUrl;
        } else {
            errorMsg.style.display = 'block';
        }
    </script>

</body>
</html>
